name: large_batch

resources:
  cloud: gcp
  region: us-central1
  instance_type: n4-highmem-8
  use_spot: false
  # disk_size: 100

workdir: .

setup: |
  curl -LsSf https://astral.sh/uv/install.sh | sh

run: |
  set -e
  source $HOME/.local/bin/env
  echo "Starting large batch job example"
  PYTHONUNBUFFERED=1 uv run batch.py
  echo "Job completed"
