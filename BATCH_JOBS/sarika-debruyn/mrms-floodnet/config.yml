name: mrms-floodnet-join

resources:
  cloud: gcp
  region: us-central1
  instance_type: n4-highmem-16  # 16 vCPU, 128 GB RAM — needed for large in-memory merge
  use_spot: false

workdir: .  # uploads batch.py and any local files to the VM

setup: |
  curl -LsSf https://astral.sh/uv/install.sh | sh

run: |
  set -e
  source $HOME/.local/bin/env
  PYTHONUNBUFFERED=1 uv run batch.py