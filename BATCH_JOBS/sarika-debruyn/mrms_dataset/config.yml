name: mrms-pipeline

resources:
  cloud: gcp
  region: us-east1
  instance_type: n4-highmem-16
  use_spot: false

workdir: .

envs:
  START_DATE: "2022-04-01"
  END_DATE: "2023-01-01"
  WORKERS: "64"

setup: |
  curl -LsSf https://astral.sh/uv/install.sh | sh

run: |
  set -e
  source $HOME/.local/bin/env
  PYTHONUNBUFFERED=1 uv run batch.py
