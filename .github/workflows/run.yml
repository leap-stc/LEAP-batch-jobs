name: Run Batch Job

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Path to the job folder (e.g. examples/small_job)'
        required: true
        type: string

      instance_type:
        description: 'GCP instance type (overrides config.yml)'
        required: true
        default: 'from config'
        type: choice
        options:
          - 'from config'
          - n4-standard-4
          - n4-standard-8
          - n4-standard-16
          - n4-highmem-16
          - n4-highmem-32

      disk_size_gb:
        description: 'Attached disk size in GB (none = no extra disk). Only if you need to cache data locally before writing to GCP.'
        required: true
        default: 'none'
        type: choice
        options:
          - 'none'
          - '50'
          - '100'
          - '200'
          - '500'

      job_env:
        description: 'Extra env vars to pass to the job (e.g. N=8000 N_EPOCHS=100). Overrides defaults in config.yml envs.'
        required: false
        default: ''
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dispatch

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/893029493037/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'skypilot-v1@leap-pangeo.iam.gserviceaccount.com'
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit job
        id: submit
        run: |
          uv run sky check gcp
          JOB_NAME="${{ github.event.repository.name }}-${{ github.run_id }}"
          DISK_ARG=""
          INSTANCE_ARG=""
          if [[ "${{ inputs.disk_size_gb }}" =~ ^[0-9]+$ ]]; then
            DISK_ARG="--disk-size ${{ inputs.disk_size_gb }}"
          fi
          if [[ "${{ inputs.instance_type }}" != "from config" ]]; then
            INSTANCE_ARG="--instance-type ${{ inputs.instance_type }}"
          fi
          cd "${{ inputs.job }}"
          ENV_ARGS=""
          for pair in ${{ inputs.job_env }}; do
            ENV_ARGS="$ENV_ARGS --env $pair"
          done
          uv run sky jobs launch -y --detach-run -n "$JOB_NAME" \
            $INSTANCE_ARG \
            $DISK_ARG \
            $ENV_ARGS \
            config.yml
          echo "job_name=$JOB_NAME" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          STATUS="${{ steps.submit.outcome }}"
          JOB_NAME="${{ steps.submit.outputs.job_name }}"
          if [ "$STATUS" = "success" ]; then
            echo "### Job submitted" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Submission failed" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| Job | \`${{ inputs.job }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job name | \`${JOB_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instance | \`${{ inputs.instance_type }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Disk | \`${{ inputs.disk_size_gb }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Env | \`${{ inputs.job_env }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$STATUS" = "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Monitor: \`sky jobs queue\` or \`sky jobs logs ${JOB_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
