name: Run Batch Job

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Path to the job folder (e.g. examples/small_job)'
        required: true
        type: string

      instance_type:
        description: 'GCP instance type (overrides config.yml)'
        required: true
        default: 'from config'
        type: choice
        options:
          - 'from config'
          - n4-standard-4
          - n4-standard-8
          - n4-standard-16
          - n4-highmem-16
          - n4-highmem-32

      disk_size_gb:
        description: 'Attached disk size in GB (none = no extra disk). Only if you need to cache data locally before writing to GCP.'
        required: true
        default: 'none'
        type: choice
        options:
          - 'none'
          - '50'
          - '100'
          - '200'
          - '500'

      job_env:
        description: 'Extra env vars to pass to the job (e.g. N=8000 N_EPOCHS=100). Overrides defaults in config.yml envs.'
        required: false
        default: ''
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dispatch

      - name: Submit job
        id: submit
        env:
          SKYPILOT_API_URL: ${{ vars.SKYPILOT_API_URL }}
          INPUT_JOB: ${{ inputs.job }}
          INPUT_INSTANCE_TYPE: ${{ inputs.instance_type }}
          INPUT_DISK_SIZE_GB: ${{ inputs.disk_size_gb }}
          INPUT_JOB_ENV: ${{ inputs.job_env }}
        run: |
          uv run sky api login -e "$SKYPILOT_API_URL"

          JOB_NAME="$(basename "$INPUT_JOB")-$GITHUB_ACTOR-$GITHUB_RUN_ID"
          DISK_ARG=""
          INSTANCE_ARG=""
          if [[ "$INPUT_DISK_SIZE_GB" =~ ^[0-9]+$ ]]; then
            DISK_ARG="--disk-size $INPUT_DISK_SIZE_GB"
          fi
          if [[ "$INPUT_INSTANCE_TYPE" != "from config" ]]; then
            INSTANCE_ARG="--instance-type $INPUT_INSTANCE_TYPE"
          fi
          ENV_ARGS=""
          for pair in $INPUT_JOB_ENV; do
            ENV_ARGS="$ENV_ARGS --env $pair"
          done

          cd "$INPUT_JOB"
          LAUNCH_OUTPUT=$(uv run sky jobs launch -y -n "$JOB_NAME" --async \
            $INSTANCE_ARG \
            $DISK_ARG \
            $ENV_ARGS \
            config.yml 2>&1)
          echo "$LAUNCH_OUTPUT"

          JOB_ID=$(echo "$LAUNCH_OUTPUT" | grep -oP 'Job submitted, ID: \K\d+' || true)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        env:
          SKYPILOT_API_URL: ${{ vars.SKYPILOT_API_URL }}
          INPUT_JOB: ${{ inputs.job }}
          INPUT_INSTANCE_TYPE: ${{ inputs.instance_type }}
          INPUT_DISK_SIZE_GB: ${{ inputs.disk_size_gb }}
          JOB_ID: ${{ steps.submit.outputs.job_id }}
          STEP_OUTCOME: ${{ steps.submit.outcome }}
        run: |
          DASHBOARD="${SKYPILOT_API_URL}/dashboard"
          if [ "$STEP_OUTCOME" = "success" ]; then
            echo "### Job submitted" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Job submission failed" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| Job | \`${INPUT_JOB}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instance | \`${INPUT_INSTANCE_TYPE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Disk | \`${INPUT_DISK_SIZE_GB}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job ID | \`${JOB_ID}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dashboard | ${DASHBOARD} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Stream logs:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "sky api login -e ${SKYPILOT_API_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "sky jobs logs --name $(basename "$INPUT_JOB")-$GITHUB_ACTOR-$GITHUB_RUN_ID" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
