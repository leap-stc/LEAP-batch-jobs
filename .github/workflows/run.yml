name: Run Batch Job

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Path to the job folder (e.g. examples/small_job)'
        required: true
        type: string

      instance_type:
        description: 'GCP instance type (overrides config.yml)'
        required: true
        default: 'from config'
        type: choice
        options:
          - 'from config'
          - n4-standard-4
          - n4-standard-8
          - n4-standard-16
          - n4-highmem-16
          - n4-highmem-32

      disk_size_gb:
        description: 'Attached disk size in GB (none = no extra disk). Only if you need to cache data locally before writing to GCP.'
        required: true
        default: 'none'
        type: choice
        options:
          - 'none'
          - '50'
          - '100'
          - '200'
          - '500'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/893029493037/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'skypilot-v1@leap-pangeo.iam.gserviceaccount.com'
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2


      - name: SSH tunnel instructions
        run: |
          CLUSTER_NAME="${{ github.event.repository.name }}-${{ github.run_id }}"
          echo "### Dask Dashboard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Once the cluster is provisioned and the script starts, run:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "sky ssh ${CLUSTER_NAME} -- -L 8787:localhost:8787" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Then open http://localhost:8787 in your browser." >> "$GITHUB_STEP_SUMMARY"

      - name: Launch job
        id: launch
        run: |
          uv run sky check gcp
          CLUSTER_NAME="${{ github.event.repository.name }}-${{ github.run_id }}"
          DISK_ARG=""
          INSTANCE_ARG=""
          if [[ "${{ inputs.disk_size_gb }}" =~ ^[0-9]+$ ]]; then
            DISK_ARG="--disk-size ${{ inputs.disk_size_gb }}"
          fi
          if [[ "${{ inputs.instance_type }}" != "from config" ]]; then
            INSTANCE_ARG="--instance-type ${{ inputs.instance_type }}"
          fi
          cd "${{ inputs.job }}"
          START_TIME=$(date +%s)
          uv run sky launch -y -c "$CLUSTER_NAME" \
            --down \
            $INSTANCE_ARG \
            $DISK_ARG \
            config.yml
          END_TIME=$(date +%s)
          DURATION=$(( END_TIME - START_TIME ))
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          STATUS="${{ steps.launch.outcome }}"
          if [ "$STATUS" = "success" ]; then
            echo "### Job completed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Job failed" >> "$GITHUB_STEP_SUMMARY"
          fi
          DURATION="${{ steps.launch.outputs.duration }}"
          if [[ "$DURATION" =~ ^[0-9]+$ ]]; then
            MINUTES=$(( DURATION / 60 ))
            SECONDS=$(( DURATION % 60 ))
            DURATION_STR="${MINUTES}m ${SECONDS}s"
          else
            DURATION_STR="n/a"
          fi
          echo "| Job | \`${{ inputs.job }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instance | \`${{ inputs.instance_type }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Disk | \`${{ inputs.disk_size_gb }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Duration | \`${DURATION_STR}\` |" >> "$GITHUB_STEP_SUMMARY"
