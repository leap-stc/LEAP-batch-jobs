name: Run Batch Job

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Path to the job folder (e.g. examples/small_job)'
        required: true
        type: string

      instance_type:
        description: 'GCP instance type (overrides config.yml)'
        required: true
        default: 'from config'
        type: choice
        options:
          - 'from config'
          - n4-standard-4
          - n4-standard-8
          - n4-standard-16
          - n4-highmem-16
          - n4-highmem-32

      disk_size_gb:
        description: 'Attached disk size in GB (none = no extra disk). Only if you need to cache data locally before writing to GCP.'
        required: true
        default: 'none'
        type: choice
        options:
          - 'none'
          - '50'
          - '100'
          - '200'
          - '500'

      job_env:
        description: 'Extra env vars to pass to the job (e.g. N=8000 N_EPOCHS=100). Overrides defaults in config.yml envs.'
        required: false
        default: ''
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dispatch

      - name: Submit job
        id: submit
        env:
          SKYPILOT_API_URL: ${{ secrets.SKYPILOT_API_URL }}
        run: |
          uv run sky api login -e "$SKYPILOT_API_URL"

          JOB_NAME="${{ github.event.repository.name }}-${{ github.run_id }}"
          DISK_ARG=""
          INSTANCE_ARG=""
          if [[ "${{ inputs.disk_size_gb }}" =~ ^[0-9]+$ ]]; then
            DISK_ARG="--disk-size ${{ inputs.disk_size_gb }}"
          fi
          if [[ "${{ inputs.instance_type }}" != "from config" ]]; then
            INSTANCE_ARG="--instance-type ${{ inputs.instance_type }}"
          fi
          ENV_ARGS=""
          for pair in ${{ inputs.job_env }}; do
            ENV_ARGS="$ENV_ARGS --env $pair"
          done

          cd "${{ inputs.job }}"
          LAUNCH_OUTPUT=$(uv run sky jobs launch -y -n "$JOB_NAME" --async \
            $INSTANCE_ARG \
            $DISK_ARG \
            $ENV_ARGS \
            config.yml 2>&1)
          echo "$LAUNCH_OUTPUT"

          JOB_ID=$(echo "$LAUNCH_OUTPUT" | grep -oP 'Job submitted, ID: \K\d+' || true)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: always()
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          DASHBOARD="${{ secrets.SKYPILOT_API_URL }}/dashboard"
          STATUS="${{ steps.submit.outcome }}"
          if [ "$STATUS" = "success" ]; then
            echo "### Job submitted" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Job submission failed" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| Job | \`${{ inputs.job }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instance | \`${{ inputs.instance_type }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Disk | \`${{ inputs.disk_size_gb }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job ID | \`${JOB_ID}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dashboard | ${DASHBOARD} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Monitor: \`sky jobs logs ${JOB_ID}\` or \`sky jobs queue\`" >> "$GITHUB_STEP_SUMMARY"
